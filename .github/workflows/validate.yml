name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint JSON manifests
        run: |
          jq -e . .claude-plugin/plugin.json
          jq -e . .claude-plugin/marketplace.json
          jq -e '.name and .version and .description' .claude-plugin/plugin.json
          jq -e '.name and .owner and (.plugins | type == "array" and length > 0)' .claude-plugin/marketplace.json

      - name: Shellcheck hook scripts
        run: |
          if compgen -G "scripts/*.sh" > /dev/null; then
            sudo apt-get install -y shellcheck
            shellcheck scripts/*.sh
          else
            echo "no scripts yet, skipping"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate plugin with Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .

  install-e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Doctor reports missing fence cleanly
        run: |
          out=$(scripts/doctor.sh)
          echo "$out"
          echo "$out" | grep -q "MISSING  fence"

      - name: Risk report degrades cleanly without hooprs
        run: |
          out=$(scripts/risk-report.sh)
          echo "$out"
          echo "$out" | grep -q "MISSING  hooprs"

      - name: PII scan degrades cleanly without alcatraz
        run: |
          out=$(scripts/pii-scan.sh)
          echo "$out"
          echo "$out" | grep -q "MISSING  alcatraz"
          # The hooks are silent no-ops without any binary installed.
          test -z "$(printf '{"tool_name":"Bash","tool_response":{"stdout":"jane@example.com"}}' | scripts/post-tool.sh)"
          test -z "$(printf '{"prompt":"mail jane@example.com"}' | scripts/prompt-guard.sh)"

      - name: Install fence from GitHub release (checksum-verified)
        run: |
          HOOP_INSTALL_CHANNEL=release HOOP_BIN_DIR="$RUNNER_TEMP/hoopbin" scripts/install-tool.sh fence
          "$RUNNER_TEMP/hoopbin/fence" version

      - name: Doctor sees the installed binary via ~/.local/bin
        run: |
          HOOP_INSTALL_CHANNEL=release scripts/install-tool.sh fence
          out=$(scripts/doctor.sh)
          echo "$out"
          echo "$out" | grep -q "OK       fence"

      - name: Install hooprs from GitHub release (checksum-verified)
        run: |
          HOOP_INSTALL_CHANNEL=release scripts/install-tool.sh hooprs
          out=$(scripts/doctor.sh)
          echo "$out"
          echo "$out" | grep -q "OK       hooprs"

      - name: Risk report runs end-to-end (session scope + all)
        run: |
          out=$(scripts/risk-report.sh)
          echo "$out"
          echo "$out" | grep -q "ERROR    cannot identify the current session"
          out=$(CLAUDE_CODE_SESSION_ID=00000000-0000-0000-0000-000000000000 scripts/risk-report.sh)
          echo "$out"
          echo "$out" | grep -q "REPORT   html:"
          out=$(scripts/risk-report.sh all)
          echo "$out"
          echo "$out" | grep -q "REPORT   json:"
          test -s "$(echo "$out" | sed -n 's/REPORT   json: //p')"

      - name: Install alcatraz from GitHub release (checksum-verified)
        run: |
          HOOP_INSTALL_CHANNEL=release scripts/install-tool.sh alcatraz
          out=$(scripts/doctor.sh)
          echo "$out"
          echo "$out" | grep -q "OK       alcatraz"

      - name: PII scan detects seeded PII end-to-end
        run: |
          # File mode: seeded fixture with a Luhn-valid card and an email.
          printf 'card 4532015112830366 charged\nuser jane@example.com ok\n' > "$RUNNER_TEMP/seeded.log"
          out=$(scripts/pii-scan.sh "$RUNNER_TEMP/seeded.log")
          echo "$out"
          echo "$out" | grep -q "CREDIT_CARD"
          echo "$out" | grep -q "EMAIL_ADDRESS"
          # Raw values never appear in output — masked only. Assert for
          # every seeded value, not just one entity type.
          ! echo "$out" | grep -Fq "4532015112830366"
          ! echo "$out" | grep -Fq "jane@example.com"
          # Stdin (pasted-content) mode.
          out=$(printf 'ssn 536-90-4399\n' | scripts/pii-scan.sh -)
          echo "$out"
          echo "$out" | grep -q "US_SSN"
          ! echo "$out" | grep -Fq "536-90-4399"
          # Default mode scans the git diff vs HEAD.
          echo "contact: jane@example.com" >> README.md
          out=$(scripts/pii-scan.sh)
          echo "$out"
          echo "$out" | grep -q "EMAIL_ADDRESS"
          ! echo "$out" | grep -Fq "jane@example.com"
          git checkout -- README.md

      - name: Live masking hooks end-to-end
        run: |
          post='{"tool_name":"Bash","tool_input":{"command":"psql"},"tool_response":{"stdout":"row jane@example.com card 4532015112830366","stderr":"","interrupted":false}}'
          out=$(printf '%s' "$post" | scripts/post-tool.sh)
          echo "$out"
          echo "$out" | grep -q "updatedToolOutput"
          echo "$out" | grep -q "additionalContext"
          ! echo "$out" | grep -Fq "jane@example.com"
          ! echo "$out" | grep -Fq "4532015112830366"
          # Disable switch: masking off means no opinion (julius not installed yet).
          test -z "$(printf '%s' "$post" | HOOP_PII_MASK_DISABLE=1 scripts/post-tool.sh)"
          # Read outputs pass through untouched by default.
          test -z "$(printf '{"tool_name":"Read","tool_input":{"file_path":"/tmp/u.csv"},"tool_response":{"file":{"filePath":"/tmp/u.csv","content":"jane@example.com"}}}' | scripts/post-tool.sh)"
          # Prompt guard: warn (default), block, and off.
          out=$(printf '{"prompt":"customer jane@example.com"}' | scripts/prompt-guard.sh)
          echo "$out"
          echo "$out" | grep -q "systemMessage"
          ! echo "$out" | grep -q '"decision"'
          out=$(printf '{"prompt":"ssn 536-90-4399"}' | HOOP_PROMPT_GUARD=block scripts/prompt-guard.sh)
          echo "$out"
          echo "$out" | grep -q '"decision":"block"'
          ! echo "$out" | grep -Fq "536-90-4399"
          test -z "$(printf '{"prompt":"ssn 536-90-4399"}' | HOOP_PROMPT_GUARD=off scripts/prompt-guard.sh)"

      - name: Julius rewrite protocol through plugin wrapper
        run: |
          curl -fsSL https://raw.githubusercontent.com/hoophq/julius/main/install.sh | sh
          out=$(echo '{"tool_name":"Bash","tool_input":{"command":"git status"}}' | scripts/julius-hook.sh pre)
          echo "rewrite: $out"
          echo "$out" | grep -q '"updatedInput"'
          test -z "$(echo '{"tool_name":"Bash","tool_input":{"command":"true"}}' | scripts/julius-hook.sh pre)"
          test -z "$(echo '{"tool_name":"Bash","tool_input":{"command":"git status"}}' | HOOP_JULIUS_DISABLE=1 scripts/julius-hook.sh pre)"
          # Chain smoke: with BOTH binaries present, the composed hook still
          # masks (payload under julius's 500-byte floor, so compression
          # no-ops deterministically and masking applies to the original).
          out=$(printf '{"tool_name":"Bash","tool_input":{"command":"x"},"tool_response":{"stdout":"mail jane@example.com","stderr":""}}' | scripts/post-tool.sh)
          echo "$out"
          echo "$out" | grep -q "updatedToolOutput"
          ! echo "$out" | grep -Fq "jane@example.com"
