name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint JSON manifests
        run: |
          jq -e . .claude-plugin/plugin.json
          jq -e . .claude-plugin/marketplace.json
          jq -e '.name and .version and .description' .claude-plugin/plugin.json
          jq -e '.name and .owner and (.plugins | type == "array" and length > 0)' .claude-plugin/marketplace.json

      - name: Shellcheck hook scripts
        run: |
          if compgen -G "scripts/*.sh" > /dev/null; then
            sudo apt-get install -y shellcheck
            shellcheck scripts/*.sh
          else
            echo "no scripts yet, skipping"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate plugin with Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .
